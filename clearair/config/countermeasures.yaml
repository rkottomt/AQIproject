    traffic_peak_hours: -0.20
    traffic_concentration: -0.15
    NO2: -0.10
    CO: -0.08
  cost_tier: medium
  cost_tier_weight: 2.0
  typical_lag_days: 30
  suitable_seasons: ["all"]
  suitable_city_types: ["all"]

industrial_emission_control:
