construction_dust_control:
  display_name: "Construction Dust Control"
  description: "Water spraying, dust barriers, and site management on active construction"
  affects_features:
    PM2.5: -0.30
    PM10: -0.35
    visibility: +0.15
  cost_tier: low
  cost_tier_weight: 1.0
  typical_lag_days: 7
  suitable_seasons: ["all"]
  suitable_city_types: ["developing", "urban"]

promote_public_transport:
  display_name: "Promote Public Transport"
  description: "Subsidies, frequency increases, and campaigns to shift commuters to transit"
