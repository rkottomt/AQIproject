version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: clearair
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clearair
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [db]
    volumes: [".:/app"]

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports: ["8501:8501"]
    env_file: .env
    depends_on: [api]
    volumes: [".:/app"]

volumes:
  pgdata:
